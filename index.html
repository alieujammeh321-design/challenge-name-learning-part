<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="./style-sheet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">


</head>

<body>
  <main class="card">
    <div class="image-wrapper">
      <img src="images/illustration-article.svg" alt="illustration article">
    </div>
    <span>Learning</span>

    <p class="date">Published 21 Dec 2023</p>

    <h1>HTML & CSS foundations</h1>

    <p class="paragraph">These languages are the backbone of every website, defining structure, content, and
      presentation.</p>

    <div class="footer-wrapper">
      <div class="avatar-image-wrapper">
        <img src="images/image-avatar.webp" alt="image avatar">
      </div>
      <strong>Greg Hooper</strong>
    </div>
  </main>

</html>
